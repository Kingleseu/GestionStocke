services:
  - type: web
    name: gestionstocke
    runtime: python
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn redpos.wsgi:application --bind 0.0.0.0:10000 --workers 3"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gestionstocke-db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

databases:
  - name: gestionstocke-db
    databaseName: gestionstocke
    user: gestionstocke
