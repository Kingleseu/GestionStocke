{% extends 'base.html' %}
{% load static %}

{% block title %}Succès - MKARIBU{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 py-5" style="background: #f8fafc;">
    <div class="col-md-6 col-lg-4 text-center">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
            <div class="card-body p-4 p-lg-5">
                <div class="mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3" style="width: 64px; height: 64px;">
                        <i class="bi bi-check-circle-fill fs-3"></i>
                    </div>
                </div>
                <h3 class="fw-bold">Succès !</h3>
                <p class="text-muted small">Votre nouveau mot de passe a bien été enregistré. Vous pouvez maintenant vous connecter.</p>
                <div class="mt-4">
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm">
                        Se connecter
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
