<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Hamburger Button</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; }
        .test-box {
            border: 2px solid red;
            padding: 20px;
            margin: 20px;
            background: #f0f0f0;
        }
        #sidebarCollapse {
            min-width: 40px;
            width: auto;
            height: 40px;
            padding: 0.5rem 0.75rem !important;
            display: flex !important;
            visibility: visible !important;
            align-items: center !important;
            justify-content: center !important;
            border-radius: 0.25rem;
            background: rgba(0, 0, 0, 0.05) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            color: #333 !important;
            cursor: pointer;
            opacity: 1 !important;
            z-index: 999;
        }
        #sidebarCollapse i {
            font-size: 1.25rem;
            margin: 0;
        }
        .visible-check {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h1>🧪 Test Hamburger Button</h1>
        <p>Vérifier que le bouton est visible:</p>

        <div style="border: 2px solid blue; padding: 10px; margin: 10px 0;">
            <button type="button" id="sidebarCollapse" class="btn btn-sm btn-light me-3 shadow-sm border" title="Toggle sidebar menu" aria-label="Toggle sidebar menu">
                <i class="bi bi-list"></i>
            </button>
            <span class="visible-check">← Le bouton hamburger doit être VISIBLE ici (☰)</span>
        </div>

        <hr>

        <h3>📋 Checklist:</h3>
        <ul>
            <li id="check1">❌ Bouton visible: <span id="status1">Vérification...</span></li>
            <li id="check2">❌ Bouton cliquable: <span id="status2">Vérification...</span></li>
            <li id="check3">❌ Icône visible: <span id="status3">Vérification...</span></li>
            <li id="check4">❌ Viewport: <span id="status4">Vérification...</span></li>
        </ul>
        <hr>

        <h3>🔍 Info Système:</h3>
        <pre id="info"></pre>
    </div>

    <script>
        window.addEventListener('load', function() {
            const btn = document.getElementById('sidebarCollapse');
            const icon = btn ? btn.querySelector('i') : null;

            // Test 1: Bouton existe
            const visible = btn !== null;
            document.getElementById('status1').textContent = visible ? '✅ OUI' : '❌ NON';
            if (visible) document.getElementById('check1').innerHTML = '✅ Bouton visible: <span id="status1">✅ OUI</span>';

            // Test 2: Cliquable
            const clickable = btn && btn.offsetParent !== null;
            document.getElementById('status2').textContent = clickable ? '✅ OUI' : '❌ NON';
            if (clickable) document.getElementById('check2').innerHTML = '✅ Bouton cliquable: <span id="status2">✅ OUI</span>';

            // Test 3: Icône
            const iconVisible = icon !== null;
            document.getElementById('status3').textContent = iconVisible ? '✅ OUI' : '❌ NON';
            if (iconVisible) document.getElementById('check3').innerHTML = '✅ Icône visible: <span id="status3">✅ OUI</span>';

            // Test 4: Viewport
            const viewport = `${window.innerWidth}x${window.innerHeight}`;
            document.getElementById('status4').textContent = viewport;
            if (window.innerWidth < 992) {
                document.getElementById('check4').innerHTML = '✅ Mobile (<992px): <span id="status4">' + viewport + '</span>';
            }

            // Info détaillée
            const info = {
                'Window Size': `${window.innerWidth}x${window.innerHeight}`,
                'Is Mobile': window.innerWidth < 992,
                'Button Element': btn ? 'EXISTE' : 'MANQUANT',
                'Button Display': btn ? window.getComputedStyle(btn).display : 'N/A',
                'Button Visibility': btn ? window.getComputedStyle(btn).visibility : 'N/A',
                'Button Opacity': btn ? window.getComputedStyle(btn).opacity : 'N/A',
                'Button offsetParent': btn ? (btn.offsetParent ? 'VISIBLE' : 'HIDDEN') : 'N/A',
                'Icon HTML': icon ? icon.className : 'MANQUANT'
            };

            document.getElementById('info').textContent = JSON.stringify(info, null, 2);

            // Test click
            if (btn) {
                btn.addEventListener('click', function() {
                    alert('✅ Le bouton est cliquable!');
                });
            }
        });
    </script>
</body>
</html>
